services:
  caddy:
    image: caddy:2-alpine
    container_name: newsbrief-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.compose:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # Persist certificates
      - caddy_config:/config  # Persist config
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: newsbrief-db
    environment:
      POSTGRES_DB: newsbrief
      POSTGRES_USER: newsbrief
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsbrief -d newsbrief"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    # image: used by production (make deploy pulls from GHCR, no --build)
    # build: used by development (make dev or explicit --build flag)
    image: ghcr.io/deim0s13/newsbrief:latest
    build: .
    container_name: newsbrief
    # Direct access on 8787 for Windows (TLS via Caddy on newsbrief.local when WSL2 forwarding is set up)
    ports:
      - "8787:8787"
    environment:
      ENVIRONMENT: production
      # Database connection - must match POSTGRES_PASSWORD above
      # If you change POSTGRES_PASSWORD, also update DATABASE_URL
      DATABASE_URL: ${DATABASE_URL}
      # Ollama LLM connection — Podman resolves host.containers.internal on macOS and Windows
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.containers.internal:11434}
    volumes:
      - newsbrief_data:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  newsbrief_data:
  caddy_data:
  caddy_config:
