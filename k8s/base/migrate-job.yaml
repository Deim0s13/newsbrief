# Runs Alembic against the same DATABASE_URL as the API Deployment.
# Sync wave 1 applies after ConfigMap (wave 0); Argo CD waits for Job success before wave 2 (Deployment).
# Replace=true: Job spec.template is immutable in Kubernetes; replace recreates the Job when the image or env changes.
apiVersion: batch/v1
kind: Job
metadata:
  name: newsbrief-db-migrate
  labels:
    app.kubernetes.io/name: newsbrief
    app.kubernetes.io/component: db-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: newsbrief
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: alembic
          image: localhost:5000/newsbrief:dev-latest
          workingDir: /app
          command: ["/opt/venv/bin/alembic"]
          args: ["upgrade", "head"]
          envFrom:
            - configMapRef:
                name: newsbrief-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
