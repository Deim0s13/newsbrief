# Runs Alembic against the same DATABASE_URL as the API Deployment.
# Wave 1 after ConfigMap (wave 0); Deployment is wave 2.
# Sync hook + BeforeHookCreation: Kubernetes Job pod templates are immutable — delete previous Job
# before applying the new one (Replace=true uses kubectl replace and fails validation).
apiVersion: batch/v1
kind: Job
metadata:
  name: newsbrief-db-migrate
  labels:
    app.kubernetes.io/name: newsbrief
    app.kubernetes.io/component: db-migrate
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: newsbrief
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: alembic
          image: localhost:5000/newsbrief:dev-latest
          imagePullPolicy: Always
          workingDir: /app
          command: ["/opt/venv/bin/alembic"]
          args: ["upgrade", "head"]
          envFrom:
            - configMapRef:
                name: newsbrief-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
