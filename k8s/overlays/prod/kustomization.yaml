apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: newsbrief-prod

namespace: newsbrief-prod

labels:
  - pairs:
      app.kubernetes.io/instance: prod
      environment: production
    includeSelectors: false

resources:
  - ../../base
  - embed-backfill-job.yaml  # PostSync embedding backfill (prod only; #254)
  - pdb.yaml  # PodDisruptionBudget for HA
  - pvc.yaml  # Persistent storage for data

# Override namespace name for prod
patches:
  - target:
      kind: Namespace
      name: newsbrief
    patch: |
      - op: replace
        path: /metadata/name
        value: newsbrief-prod
  # Strategic merge patch for deployment (resources, probes, affinity)
  - path: deployment-patch.yaml
  # JSON patch to replace emptyDir with PVC (more reliable than strategic merge)
  - target:
      kind: Deployment
      name: newsbrief
    patch: |
      - op: replace
        path: /spec/template/spec/volumes
        value:
          - name: data
            persistentVolumeClaim:
              claimName: newsbrief-data

images:
  - name: localhost:5000/newsbrief
    newName: ghcr.io/deim0s13/newsbrief
    # Tag updated automatically by ci-prod.yml update-manifest job on each release
    newTag: v0.8.3.1

# Prod-specific configuration overrides
configMapGenerator:
  - name: newsbrief-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - NEWSBRIEF_MAX_ITEMS_PER_REFRESH=200
      - NEWSBRIEF_MAX_ITEMS_PER_FEED=100
      - DATABASE_URL=postgresql://newsbrief:newsbrief_dev@host.containers.internal:5432/newsbrief
