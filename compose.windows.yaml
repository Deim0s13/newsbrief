# Windows production overrides.
# Use with: podman-compose -f compose.yaml -f compose.windows.yaml
#
# Differences from compose.prod.yaml:
#   - No Podman secrets — password comes from .env POSTGRES_PASSWORD directly.
#     Podman secrets are namespaced per runtime instance; a secret created in
#     WSL2 Podman is invisible to Windows Podman Desktop (separate machine).
#   - Caddy uses command-line reverse-proxy (no Caddyfile bind mount).
#     Windows Podman Desktop cannot bind-mount WSL2 UNC paths; named volumes
#     work fine. TLS (newsbrief.local) is macOS-only via compose.yaml.
#   - restart: unless-stopped on all services so containers survive reboots
#     without any WSL2 involvement.
#
# First-time setup:
#   1. make env-init           (in WSL2) — generates .env with credentials
#   2. make compose-autostart-install  (in WSL2) — registers Task Scheduler tasks
#   3. Start-ScheduledTask 'NewsBrief Compose Watch'  (PowerShell) — initial deploy + migrate

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped

  api:
    restart: unless-stopped

  caddy:
    # Override: use Caddy's built-in reverse-proxy command instead of a Caddyfile.
    # This removes the ./Caddyfile.compose bind mount (UNC paths unsupported by
    # Windows Podman Desktop). Access the app at http://localhost or http://localhost:8787.
    command: caddy reverse-proxy --from :80 --to newsbrief:8787
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
