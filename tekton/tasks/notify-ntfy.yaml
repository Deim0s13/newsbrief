apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: notify-ntfy
  labels:
    app.kubernetes.io/part-of: newsbrief
spec:
  description: |
    Send notifications via ntfy.sh for pipeline status updates.
    Subscribers must add this topic in the ntfy app or open
    https://ntfy.sh/<topic> (default topic: newsbrief-ci) to receive messages.
    Topic is public unless you self-host ntfy with access control.
  params:
    - name: topic
      description: ntfy.sh topic name (use unique name for privacy)
      type: string
      default: "newsbrief-ci"
    - name: title
      description: Notification title
      type: string
    - name: message
      description: Notification message body
      type: string
    - name: priority
      description: "Priority level: min, low, default, high, urgent"
      type: string
      default: "high"
    - name: tags
      description: "Emoji tags (comma-separated, e.g., 'x,pipeline')"
      type: string
      default: "bell"
    - name: click-url
      description: URL to open when notification is clicked (optional)
      type: string
      default: ""
  steps:
    - name: send-notification
      image: curlimages/curl:8.5.0
      script: |
        #!/bin/sh
        set -e

        echo "📤 Sending notification to ntfy.sh/$(params.topic)"
        echo "   Title: $(params.title)"
        echo "   Priority: $(params.priority)"

        # -f: fail on HTTP 4xx/5xx so the step errors instead of printing false success
        curl -fsS \
          -H "Title: $(params.title)" \
          -H "Priority: $(params.priority)" \
          -H "Tags: $(params.tags)" \
          -d "$(params.message)" \
          "https://ntfy.sh/$(params.topic)"

        echo ""
        echo "✅ ntfy accepted the message (subscribe to topic $(params.topic) in the ntfy app to see it)"
