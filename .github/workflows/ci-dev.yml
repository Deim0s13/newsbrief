name: CI Dev

on:
  push:
    branches: [dev]

permissions:
  contents: write    # manifest update commit + push
  packages: write    # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: deim0s13/newsbrief

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install formatting tools
        run: pip install black==24.10.0 isort

      - name: black
        run: black --check --diff app/ tests/

      - name: isort
        run: isort --check-only --diff --profile=black app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: newsbrief
          POSTGRES_PASSWORD: newsbrief
          POSTGRES_DB: newsbrief_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      DATABASE_URL: postgresql://newsbrief:newsbrief@localhost:5432/newsbrief_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: pytest
        run: pytest tests/ --cov=app --cov-report=term -v --tb=short -m "not requires_ollama"

      - name: mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      sha-tag: ${{ steps.tags.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "sha-tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ steps.tags.outputs.sha-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}

  update-manifest:
    name: Update k8s Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dev kustomization image tag
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          sed -i "s/newTag:.*/newTag: sha-${SHORT_SHA}/" k8s/overlays/dev/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes needed"
          else
            git commit -m "chore(cd): update dev image to sha-${SHORT_SHA} [skip ci]"
            git push
          fi

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, test, build-and-push, update-manifest]
    if: always()
    steps:
      - name: Send ntfy notification
        run: |
          if echo '${{ toJSON(needs) }}' | grep -q '"result":"failure"'; then
            PRIORITY="high"
            EMOJI="❌"
            STATUS="FAILED"
          else
            PRIORITY="default"
            EMOJI="✅"
            STATUS="passed"
          fi
          curl -s -X POST \
            -H "Priority: ${PRIORITY}" \
            -H "Title: NewsBrief CI dev ${EMOJI}" \
            -d "${STATUS}: ${GITHUB_SHA:0:7} — ${{ github.event.head_commit.message }}" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"
