---
# Main recovery playbook - run after laptop reboot/wake
# Usage: ansible-playbook -i inventory/localhost.yml playbooks/recover.yml
#
# This playbook checks and restarts all NewsBrief services:
# 1. Podman machine
# 2. Kind cluster with local registry
# 3. Tekton pipelines and triggers (+ cosign secret from Bitwarden)
# 4. ArgoCD
# 5. Production PostgreSQL (host:5432 for prod in Kind)
# 6. Port forwards + wait for prod deployment
# 7. Caddy reverse proxy
# 8. Smee webhook relay

- name: Recover NewsBrief Development Environment
  hosts: localhost
  gather_facts: true

  vars:
    force_recreate: false  # Set to true to force full recreation

  tasks:
    - name: Check and start Podman
      include_role:
        name: podman

    - name: Check and create Kind cluster
      include_role:
        name: kind

    - name: Install/verify Tekton
      include_role:
        name: tekton

    - name: Install/verify ArgoCD
      include_role:
        name: argocd

    - name: Start production PostgreSQL (host:5432 for prod in Kind)
      command: podman-compose -f compose.yaml up -d db
      args:
        chdir: "{{ project_root }}"
      changed_when: true

    - name: Wait for PostgreSQL to accept connections
      command: podman exec newsbrief-db pg_isready -U newsbrief -d newsbrief
      register: pg_ready
      until: pg_ready.rc == 0
      retries: 15
      delay: 2
      failed_when: false

    - name: Fail if PostgreSQL did not become ready
      fail:
        msg: "PostgreSQL (newsbrief-db) did not become ready. Check with: podman logs newsbrief-db"
      when: pg_ready.rc != 0

    - name: Setup NewsBrief application
      include_role:
        name: newsbrief

    - name: Start Caddy reverse proxy
      include_role:
        name: caddy

    - name: Start Smee webhook relay
      include_role:
        name: smee

    - name: Display service status
      debug:
        msg: |

          ════════════════════════════════════════════════════════════════
          ✅ NewsBrief Environment Recovered!
          ════════════════════════════════════════════════════════════════

          Prod (Kubernetes):
            • App:              https://newsbrief.local
            • Tekton Dashboard: http://localhost:9097
            • Smee Relay:       https://smee.io/cddqBCYHwHG3ZcUY

          Dev (Local):
            • Run: make dev → http://localhost:8787

          CI/CD:
            • GitHub webhooks relay to local EventListener via Smee
            • Logs: /tmp/smee.log

          ════════════════════════════════════════════════════════════════
